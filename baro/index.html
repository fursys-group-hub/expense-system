<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>바로서비스 지출결의 시스템</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #1a3a6b;
    --primary-light: #2451a0;
    --accent: #e8f0fe;
    --bg: #f0f2f5;
    --card: #ffffff;
    --border: #d0d5dd;
    --text: #1d2939;
    --muted: #667085;
    --font: 'Malgun Gothic', '맑은 고딕', 'Apple SD Gothic Neo', sans-serif;
  }
  body {
    font-family: var(--font);
    background: var(--bg);
    min-height: 100vh;
    color: var(--text);
  }

  /* 헤더 */
  .header {
    background: var(--primary);
    padding: 0 40px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .header-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    color: white;
  }
  .header-logo .company-badge {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    letter-spacing: 0.05em;
  }
  .header-title {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  .header-date {
    color: rgba(255,255,255,0.7);
    font-size: 13px;
  }

  /* 메인 컨텐츠 */
  .main {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px 60px;
  }

  .page-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 8px;
  }
  .page-subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 32px;
  }

  /* 메뉴 카드들 */
  .menu-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-bottom: 40px;
  }
  .menu-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 32px 24px;
    text-align: center;
    text-decoration: none;
    color: var(--text);
    transition: all 0.2s;
    cursor: pointer;
    display: block;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .menu-card:hover {
    border-color: var(--primary);
    box-shadow: 0 4px 16px rgba(26,58,107,0.15);
    transform: translateY(-2px);
  }
  .menu-icon {
    font-size: 44px;
    margin-bottom: 14px;
    display: block;
  }
  .menu-label {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 6px;
    color: var(--primary);
  }
  .menu-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
  }
  .menu-badge {
    display: inline-block;
    background: var(--accent);
    color: var(--primary);
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
    margin-top: 8px;
  }

  /* 안내 박스 */
  .info-box {
    background: var(--accent);
    border: 1px solid #b3c6f5;
    border-radius: 10px;
    padding: 16px 20px;
    font-size: 13px;
    color: var(--primary);
    line-height: 1.8;
  }
  .info-box strong { font-weight: 700; }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">
    <span class="company-badge">바로서비스</span>
    <span class="header-title">지출결의 시스템</span>
  </div>
  <div class="header-date" id="header-date"></div>
</div>

<div class="main">
  <div class="page-title">지출 신청</div>
  <div class="page-subtitle">신청할 지출 유형을 선택해 주세요.</div>

  <div class="menu-grid">
    <a class="menu-card" href="mileage.html">
      <span class="menu-icon">🚗</span>
      <div class="menu-label">자차비 청구</div>
      <div class="menu-desc">직원 차량 운행비<br>경로 검색 및 자동 계산</div>
      <div class="menu-badge">운행비 · 통행료 · 주차비</div>
    </a>
    <a class="menu-card" href="corporate.html">
      <span class="menu-icon">💳</span>
      <div class="menu-label">법인카드 지출</div>
      <div class="menu-desc">법인카드 사용 내역<br>세금계산서 정보 입력</div>
      <div class="menu-badge">공급가액 · 부가세 자동계산</div>
    </a>
    <a class="menu-card" href="personal.html">
      <span class="menu-icon">🧾</span>
      <div class="menu-label">개인미지급금</div>
      <div class="menu-desc">개인 지출 후 청구<br>지출결의서 양식</div>
      <div class="menu-badge">합계 자동계산</div>
    </a>
  </div>

  <div class="info-box">
    <strong>📌 이용 안내</strong><br>
    · 제출된 내역은 구글 시트에 자동으로 저장됩니다.<br>
    · 자차비는 운행목적, 출발지, 도착지를 정확히 입력해 주세요.<br>
    · 법인카드는 영수증의 사업자번호와 금액을 정확히 입력해 주세요.<br>
    · 문의: 관리팀
  </div>
</div>

<script>
  const d = new Date();
  document.getElementById('header-date').textContent =
    d.getFullYear() + '년 ' + (d.getMonth()+1) + '월 ' + d.getDate() + '일';
</script>
</body>
</html>
